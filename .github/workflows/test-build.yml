name: Test Build

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build-lite:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - name: Build sandbox-lite
        uses: docker/build-push-action@v6
        with:
          context: ./sandbox-lite
          file: ./sandbox-lite/Dockerfile
          push: false
          tags: sandbox-lite:dev
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Verify lite tools
        run: |
          docker run --rm sandbox-lite:dev bash -c '
            echo "=== Git ===" && git --version &&
            echo "=== Python ===" && python3 --version &&
            echo "=== tree-sitter CLI ===" && tree-sitter --version &&
            echo "=== tree-sitter Python ===" && python3 -c "from tree_sitter import Language; print(\"OK\")" &&
            echo "ALL LITE TOOLS OK"
          '

  build-base:
    needs: [build-lite]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - name: Build sandbox-lite (dependency)
        uses: docker/build-push-action@v6
        with:
          context: ./sandbox-lite
          file: ./sandbox-lite/Dockerfile
          push: false
          tags: sandbox-lite:latest
          load: true
          cache-from: type=gha
          platforms: linux/amd64

      - name: Build sandbox-base
        uses: docker/build-push-action@v6
        with:
          context: ./sandbox-base
          file: ./sandbox-base/Dockerfile
          push: false
          tags: sandbox-base:dev
          load: true
          build-args: |
            BASE_IMAGE=sandbox-lite:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Verify base tools
        run: |
          docker run --rm sandbox-base:dev bash -c '
            echo "=== Python ===" && python3 --version && pip3 --version &&
            poetry --version && uv --version &&
            echo "=== Node.js ===" && node --version && npm --version &&
            yarn --version && pnpm --version && bun --version &&
            echo "=== Java ===" && java -version && mvn --version &&
            gradle --version &&
            echo "=== Go ===" && go version &&
            echo "=== .NET ===" && dotnet --version &&
            echo "=== Ruby ===" && ruby --version &&
            echo "=== PHP ===" && php --version && composer --version &&
            echo "=== Rust ===" && rustc --version && cargo --version &&
            echo "=== C/C++ ===" && gcc --version | head -1 && clang --version | head -1 &&
            echo "=== DB Clients ===" && psql --version && redis-cli --version &&
            echo "=== Tools ===" && git --version && tree-sitter --version &&
            echo "=== Version Managers ===" && pyenv --version &&
            . /opt/nvm/nvm.sh && nvm --version &&
            /opt/rbenv/bin/rbenv --version &&
            echo "ALL TOOLS OK"
          '

  build-mobile:
    needs: [build-base]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - name: Build sandbox-lite (dependency)
        uses: docker/build-push-action@v6
        with:
          context: ./sandbox-lite
          file: ./sandbox-lite/Dockerfile
          push: false
          tags: sandbox-lite:latest
          load: true
          cache-from: type=gha
          platforms: linux/amd64

      - name: Build sandbox-base (dependency)
        uses: docker/build-push-action@v6
        with:
          context: ./sandbox-base
          file: ./sandbox-base/Dockerfile
          push: false
          tags: sandbox-base:latest
          load: true
          build-args: |
            BASE_IMAGE=sandbox-lite:latest
          cache-from: type=gha
          platforms: linux/amd64

      - name: Build sandbox-base-mobile
        uses: docker/build-push-action@v6
        with:
          context: ./sandbox-base-mobile
          file: ./sandbox-base-mobile/Dockerfile
          push: false
          tags: sandbox-base-mobile:dev
          load: true
          build-args: |
            BASE_IMAGE=sandbox-base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Verify mobile tools
        run: |
          docker run --rm sandbox-base-mobile:dev bash -c '
            echo "=== Flutter ===" && flutter --version &&
            echo "=== Dart ===" && dart --version &&
            echo "=== Android SDK ===" && sdkmanager --version &&
            echo "=== Node.js (for RN) ===" && node --version &&
            echo "=== Inherited tools ===" && python3 --version && go version &&
            echo "ALL MOBILE TOOLS OK"
          '
