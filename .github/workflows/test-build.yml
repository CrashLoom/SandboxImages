name: Test Build

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  LITE_IMAGE: ghcr.io/crashloom/sandbox-lite
  BASE_IMAGE: ghcr.io/crashloom/sandbox-base
  MOBILE_IMAGE: ghcr.io/crashloom/sandbox-base-mobile

permissions:
  contents: read
  packages: read

jobs:
  test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Pull latest published images to seed the layer cache
      - name: Pull cache images
        run: |
          docker pull "$LITE_IMAGE:latest" || true
          docker pull "$BASE_IMAGE:latest" || true
          docker pull "$MOBILE_IMAGE:latest" || true

      # --- sandbox-lite ---
      - name: Build sandbox-lite
        run: |
          docker build \
            --cache-from "$LITE_IMAGE:latest" \
            -t sandbox-lite:dev \
            -f ./sandbox-lite/Dockerfile \
            ./sandbox-lite

      - name: Verify lite tools
        run: |
          docker run --rm sandbox-lite:dev bash -c '
            echo "=== Git ===" && git --version &&
            echo "=== Python ===" && python3 --version &&
            echo "=== tree-sitter CLI ===" && tree-sitter --version &&
            echo "=== tree-sitter Python ===" && python3 -c "from tree_sitter import Language; print(\"OK\")" &&
            echo "ALL LITE TOOLS OK"
          '

      # --- sandbox-base (inherits sandbox-lite:dev) ---
      - name: Build sandbox-base
        run: |
          docker build \
            --cache-from "$BASE_IMAGE:latest" \
            --build-arg BASE_IMAGE=sandbox-lite:dev \
            -t sandbox-base:dev \
            -f ./sandbox-base/Dockerfile \
            ./sandbox-base

      - name: Verify base tools
        run: |
          docker run --rm sandbox-base:dev bash -c '
            echo "=== Python ===" && python3 --version && pip3 --version &&
            poetry --version && uv --version &&
            echo "=== Node.js ===" && node --version && npm --version &&
            yarn --version && pnpm --version && bun --version &&
            echo "=== Ruby ===" && ruby --version &&
            echo "=== C/C++ ===" && gcc --version | head -1 && clang --version | head -1 &&
            echo "=== DB Clients ===" && psql --version && redis-cli --version &&
            echo "=== Tools ===" && git --version && tree-sitter --version &&
            echo "=== Version Managers ===" && pyenv --version &&
            . /opt/nvm/nvm.sh && nvm --version &&
            /opt/rbenv/bin/rbenv --version &&
            echo "ALL TOOLS OK"
          '

      # --- sandbox-base-mobile (inherits sandbox-base:dev) ---
      - name: Build sandbox-base-mobile
        run: |
          docker build \
            --cache-from "$MOBILE_IMAGE:latest" \
            --build-arg BASE_IMAGE=sandbox-base:dev \
            -t sandbox-base-mobile:dev \
            -f ./sandbox-base-mobile/Dockerfile \
            ./sandbox-base-mobile

      - name: Verify mobile tools
        run: |
          docker run --rm sandbox-base-mobile:dev bash -c '
            echo "=== Flutter ===" && flutter --version &&
            echo "=== Dart ===" && dart --version &&
            echo "=== Android SDK ===" && sdkmanager --version &&
            echo "=== Node.js (for RN) ===" && node --version &&
            echo "=== Inherited tools ===" && python3 --version &&
            echo "ALL MOBILE TOOLS OK"
          '
