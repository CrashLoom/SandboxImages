name: Test Build

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  LITE_IMAGE: ghcr.io/crashloom/sandbox-lite
  BASE_IMAGE: ghcr.io/crashloom/sandbox-base
  MOBILE_IMAGE: ghcr.io/crashloom/sandbox-base-mobile

permissions:
  contents: read
  packages: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      lite: ${{ steps.filter.outputs.lite }}
      base: ${{ steps.filter.outputs.base }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            lite:
              - 'sandbox-lite/**'
            base:
              - 'sandbox-base/**'
            mobile:
              - 'sandbox-base-mobile/**'

  test-build:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.lite == 'true' || needs.detect-changes.outputs.base == 'true' || needs.detect-changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- sandbox-lite: build if changed, otherwise pull latest for downstream ---
      - name: Build sandbox-lite
        if: needs.detect-changes.outputs.lite == 'true'
        run: |
          docker pull "$LITE_IMAGE:latest" || true
          docker build \
            --cache-from "$LITE_IMAGE:latest" \
            -t sandbox-lite:dev \
            -f ./sandbox-lite/Dockerfile \
            ./sandbox-lite

      - name: Verify lite tools
        if: needs.detect-changes.outputs.lite == 'true'
        run: |
          docker run --rm sandbox-lite:dev bash -c '
            echo "=== Git ===" && git --version &&
            echo "=== Python ===" && python3 --version &&
            echo "=== tree-sitter Python ===" && python3 -c "from tree_sitter import Language; print(\"OK\")" &&
            echo "=== tree-sitter Language Pack ===" && python3 -c "from tree_sitter_language_pack import get_parser; print(\"OK\")" &&
            echo "ALL LITE TOOLS OK"
          '

      # --- sandbox-base: build if base or lite changed ---
      - name: Pull sandbox-lite (unchanged)
        if: needs.detect-changes.outputs.lite != 'true' && (needs.detect-changes.outputs.base == 'true' || needs.detect-changes.outputs.mobile == 'true')
        run: |
          docker pull "$LITE_IMAGE:latest"
          docker tag "$LITE_IMAGE:latest" sandbox-lite:dev

      - name: Build sandbox-base
        if: needs.detect-changes.outputs.base == 'true' || needs.detect-changes.outputs.lite == 'true'
        run: |
          docker pull "$BASE_IMAGE:latest" || true
          docker build \
            --cache-from "$BASE_IMAGE:latest" \
            --build-arg BASE_IMAGE=sandbox-lite:dev \
            -t sandbox-base:dev \
            -f ./sandbox-base/Dockerfile \
            ./sandbox-base

      - name: Verify base tools
        if: needs.detect-changes.outputs.base == 'true' || needs.detect-changes.outputs.lite == 'true'
        run: |
          docker run --rm sandbox-base:dev bash -c '
            echo "=== Python ===" && python3 --version && pip3 --version &&
            poetry --version && uv --version &&
            echo "=== Node.js ===" && node --version && npm --version &&
            yarn --version && pnpm --version && bun --version &&
            echo "=== Ruby ===" && ruby --version &&
            echo "=== C/C++ ===" && gcc --version | head -1 && clang --version | head -1 &&
            echo "=== DB Clients ===" && psql --version && redis-cli --version &&
            echo "=== Tools ===" && git --version &&
            echo "=== Version Managers ===" && pyenv --version &&
            . /opt/nvm/nvm.sh && nvm --version &&
            /opt/rbenv/bin/rbenv --version &&
            echo "ALL TOOLS OK"
          '

      # --- sandbox-base-mobile: build if any layer changed ---
      - name: Pull sandbox-base (unchanged)
        if: needs.detect-changes.outputs.base != 'true' && needs.detect-changes.outputs.lite != 'true' && needs.detect-changes.outputs.mobile == 'true'
        run: |
          docker pull "$BASE_IMAGE:latest"
          docker tag "$BASE_IMAGE:latest" sandbox-base:dev

      - name: Build sandbox-base-mobile
        if: needs.detect-changes.outputs.mobile == 'true' || needs.detect-changes.outputs.base == 'true' || needs.detect-changes.outputs.lite == 'true'
        run: |
          docker pull "$MOBILE_IMAGE:latest" || true
          docker build \
            --cache-from "$MOBILE_IMAGE:latest" \
            --build-arg BASE_IMAGE=sandbox-base:dev \
            -t sandbox-base-mobile:dev \
            -f ./sandbox-base-mobile/Dockerfile \
            ./sandbox-base-mobile

      - name: Verify mobile tools
        if: needs.detect-changes.outputs.mobile == 'true' || needs.detect-changes.outputs.base == 'true' || needs.detect-changes.outputs.lite == 'true'
        run: |
          docker run --rm sandbox-base-mobile:dev bash -c '
            echo "=== Flutter ===" && flutter --version &&
            echo "=== Dart ===" && dart --version &&
            echo "=== Android SDK ===" && sdkmanager --version &&
            echo "=== Node.js (for RN) ===" && node --version &&
            echo "=== Inherited tools ===" && python3 --version &&
            echo "ALL MOBILE TOOLS OK"
          '
