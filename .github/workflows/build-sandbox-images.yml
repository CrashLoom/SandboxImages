name: Build Sandbox Base Images

on:
  workflow_dispatch:
    inputs:
      image:
        description: Image to build
        required: true
        default: all
        type: choice
        options:
          - all
          - sandbox-base
          - sandbox-base-mobile
          - sandbox-lite
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  BASE_IMAGE: ghcr.io/crashloom/sandbox-base
  MOBILE_IMAGE: ghcr.io/crashloom/sandbox-base-mobile
  LITE_IMAGE: ghcr.io/crashloom/sandbox-lite

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - name: Compute short SHA
        id: meta
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  build-lite:
    needs: [prepare]
    if: >-
      github.event_name == 'push' ||
      inputs.image == 'all' ||
      inputs.image == 'sandbox-lite'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.LITE_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD'}}
            type=ref,event=tag

      - uses: docker/build-push-action@v6
        with:
          context: ./sandbox-lite
          file: ./sandbox-lite/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.LITE_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.LITE_IMAGE }}:buildcache,mode=max
          platforms: linux/amd64

  verify-lite:
    needs: [prepare, build-lite]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify lite tools
        run: |
          docker pull "$LITE_IMAGE:$SHORT_SHA"
          docker run --rm "$LITE_IMAGE:$SHORT_SHA" bash -c '
            echo "=== Git ===" && git --version &&
            echo "=== Python ===" && python3 --version &&
            echo "=== tree-sitter CLI ===" && tree-sitter --version &&
            echo "=== tree-sitter Python ===" && python3 -c "from tree_sitter import Language; print(\"OK\")" &&
            echo "ALL LITE TOOLS OK"
          '
        env:
          SHORT_SHA: ${{ needs.prepare.outputs.short_sha }}

  build-base:
    needs: [prepare, verify-lite]
    if: >-
      github.event_name == 'push' ||
      inputs.image == 'all' ||
      inputs.image == 'sandbox-base'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.BASE_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD'}}
            type=ref,event=tag

      - uses: docker/build-push-action@v6
        with:
          context: ./sandbox-base
          file: ./sandbox-base/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ env.LITE_IMAGE }}:${{ needs.prepare.outputs.short_sha }}
          cache-from: type=registry,ref=${{ env.BASE_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.BASE_IMAGE }}:buildcache,mode=max
          platforms: linux/amd64

  verify-base:
    needs: [prepare, build-base]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify all tools are available
        run: |
          docker pull "$BASE_IMAGE:$SHORT_SHA"
          docker run --rm "$BASE_IMAGE:$SHORT_SHA" bash -c '
            echo "=== Python ===" && python3 --version && pip3 --version &&
            poetry --version && uv --version &&
            echo "=== Node.js ===" && node --version && npm --version &&
            yarn --version && pnpm --version && bun --version &&
            echo "=== Ruby ===" && ruby --version &&
            echo "=== C/C++ ===" && gcc --version | head -1 && clang --version | head -1 &&
            echo "=== DB Clients ===" && psql --version && redis-cli --version &&
            echo "=== Tools ===" && git --version && tree-sitter --version &&
            echo "=== Version Managers ===" && pyenv --version &&
            . /opt/nvm/nvm.sh && nvm --version &&
            /opt/rbenv/bin/rbenv --version &&
            echo "ALL TOOLS OK"
          '
        env:
          SHORT_SHA: ${{ needs.prepare.outputs.short_sha }}

  build-mobile:
    needs: [prepare, verify-base]
    if: >-
      github.event_name == 'push' ||
      inputs.image == 'all' ||
      inputs.image == 'sandbox-base-mobile'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.MOBILE_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD'}}
            type=ref,event=tag

      - uses: docker/build-push-action@v6
        with:
          context: ./sandbox-base-mobile
          file: ./sandbox-base-mobile/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}:${{ needs.prepare.outputs.short_sha }}
          cache-from: type=registry,ref=${{ env.MOBILE_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.MOBILE_IMAGE }}:buildcache,mode=max
          platforms: linux/amd64

  verify-mobile:
    needs: [prepare, build-mobile]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify mobile tools
        run: |
          docker pull "$MOBILE_IMAGE:$SHORT_SHA"
          docker run --rm "$MOBILE_IMAGE:$SHORT_SHA" bash -c '
            echo "=== Flutter ===" && flutter --version &&
            echo "=== Dart ===" && dart --version &&
            echo "=== Android SDK ===" && sdkmanager --version &&
            echo "=== Node.js (for RN) ===" && node --version &&
            echo "=== Inherited tools ===" && python3 --version &&
            echo "ALL MOBILE TOOLS OK"
          '
        env:
          SHORT_SHA: ${{ needs.prepare.outputs.short_sha }}
